name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - id: setup
        uses: ./.github/actions/setup-build

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.setup.outputs.playwright-version }}
          tags: docker-builder-playwright:test
          cache-from: type=gha,scope=linux-amd64
          cache-to: type=gha,mode=max,scope=linux-amd64

      - name: Smoke test
        run: |
          set -euo pipefail
          actual=$(docker run --rm docker-builder-playwright:test playwright --version | awk '{print $2}')
          expected="${{ steps.setup.outputs.playwright-version }}"
          echo "playwright in image: $actual (expected $expected)"
          [ "$actual" = "$expected" ]
          docker run --rm docker-builder-playwright:test node --version
