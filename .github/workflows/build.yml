name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read playwright version
        id: version
        run: echo "version=$(cat .playwright-version)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.version.outputs.version }}
          tags: docker-builder-playwright:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          set -euo pipefail
          actual=$(docker run --rm docker-builder-playwright:test playwright --version | awk '{print $2}')
          expected="${{ steps.version.outputs.version }}"
          echo "playwright in image: $actual (expected $expected)"
          [ "$actual" = "$expected" ]
          docker run --rm docker-builder-playwright:test node --version
