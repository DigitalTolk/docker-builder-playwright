name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      playwright: ${{ steps.version.outputs.playwright }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      image: ${{ steps.version.outputs.image }}
    steps:
      - uses: actions/checkout@v7

      - id: version
        run: |
          set -euo pipefail
          file_version=$(jq -r .dependencies.playwright package.json)
          tag="${GITHUB_REF_NAME#v}"
          # tag may be "1.59.1" (matches package.json) or "1.59.1-1" (image revision)
          tag_base="${tag%-*}"
          if [ "$tag_base" != "$file_version" ]; then
            echo "::error::git tag ($tag) does not match package.json playwright pin ($file_version)"
            exit 1
          fi
          echo "playwright=$file_version" >> "$GITHUB_OUTPUT"
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"
          # OCI refs must be lowercase; the org/owner in GITHUB_REPOSITORY may not be
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - id: setup
        uses: ./.github/actions/setup-build

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.setup.outputs.playwright-version }}
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - id: platform
        run: |
          name="${{ matrix.platform }}"
          echo "name=${name//\//-}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ steps.platform.outputs.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=ref,event=tag
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.prepare.outputs.image }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.image_tag }}

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image: `${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.image_tag }}`
            Playwright: `${{ needs.prepare.outputs.playwright }}`
