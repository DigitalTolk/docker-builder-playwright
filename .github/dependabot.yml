version: 2
updates:
  # Playwright — pinned exactly in package.json, read as the PLAYWRIGHT_VERSION build-arg.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build

  # GitHub Actions used by the workflows and the setup-build composite action.
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/setup-build
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # The node:24-trixie base image in the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
