name: Setup build
description: Read the pinned Playwright version and set up Docker Buildx.

outputs:
  playwright-version:
    description: Playwright version from package.json
    value: ${{ steps.version.outputs.version }}

runs:
  using: composite
  steps:
    - id: version
      shell: bash
      run: echo "version=$(jq -r .dependencies.playwright package.json)" >> "$GITHUB_OUTPUT"

    - uses: docker/setup-buildx-action@v4
